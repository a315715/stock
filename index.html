<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>台股損益工具</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#0e0f11;
  --bg1:#16181c;
  --bg2:#1e2127;
  --bg3:#262b33;
  --bd:#2e3340;
  --bd2:#3a4050;
  --text:#e8eaf0;
  --muted:#7a8090;
  --hint:#4a5060;
  --red:#ef5350;
  --red-bg:rgba(239,83,80,0.10);
  --green:#26a69a;
  --green-bg:rgba(38,166,154,0.10);
  --gold:#f0b429;
  --blue:#4a9eff;
  --blue-bg:rgba(74,158,255,0.12);
  --radius:10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
html,body{height:100%;background:var(--bg0);}
body{color:var(--text);font-family:-apple-system,"SF Pro Display","Helvetica Neue",Arial,sans-serif;font-size:15px;line-height:1.5;overscroll-behavior:none;}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;max-width:700px;margin:0 auto;}
.topbar{flex-shrink:0;display:flex;align-items:center;padding:12px 16px 8px;border-bottom:1px solid var(--bd);background:var(--bg0);position:sticky;top:0;z-index:50;}
.topbar-title{font-size:17px;font-weight:700;flex:1;}
.topbar-btn{font-size:13px;padding:6px 14px;border-radius:8px;border:1px solid var(--bd2);background:var(--bg2);color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.topbar-btn:active{background:var(--bg3);}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(60px + var(--safe-bottom));}

/* ── Bottom nav ── */
.bottomnav{flex-shrink:0;display:flex;border-top:1px solid var(--bd);background:var(--bg1);padding-bottom:var(--safe-bottom);position:fixed;bottom:0;left:0;right:0;max-width:700px;margin:0 auto;z-index:50;}
.bnav{flex:1;padding:10px 0 8px;background:transparent;border:none;color:var(--muted);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;-webkit-tap-highlight-color:transparent;}
.bnav i{font-size:20px;}
.bnav.on{color:var(--blue);}

/* ── Pages ── */
.page{display:none;}.page.on{display:block;}

/* ── Overview ── */
.overview-hero{padding:20px 16px 16px;border-bottom:1px solid var(--bd);}
.hero-label{font-size:12px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.hero-pnl{font-size:38px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.1;}
.hero-row{display:flex;gap:24px;margin-top:12px;}
.hero-item{flex:1;}
.hero-item-lbl{font-size:10px;color:var(--hint);}
.hero-item-val{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text);}

.section-hd{font-size:11px;font-weight:600;letter-spacing:0.07em;color:var(--hint);text-transform:uppercase;padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:center;}
.section-hd button{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid var(--bd2);background:transparent;color:var(--blue);cursor:pointer;-webkit-tap-highlight-color:transparent;}

/* ── Stock list ── */
.stock-list{padding:0 16px;display:flex;flex-direction:column;gap:8px;}
.stock-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:background 0.1s;}
.stock-card:active{background:var(--bg3);}
.sc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px;}
.sc-name{font-size:15px;font-weight:600;}
.sc-ticker{font-size:11px;color:var(--hint);margin-top:1px;}
.sc-pnl{text-align:right;}
.sc-pnl-val{font-size:16px;font-weight:700;font-variant-numeric:tabular-nums;}
.sc-pnl-pct{font-size:11px;margin-top:1px;}
.sc-bottom{display:flex;gap:0;border-top:1px solid var(--bd);padding-top:8px;margin-top:2px;}
.sc-stat{flex:1;text-align:center;}
.sc-stat:not(:last-child){border-right:1px solid var(--bd);}
.sc-stat-lbl{font-size:9px;color:var(--hint);}
.sc-stat-val{font-size:12px;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums;}

/* ── Detail page ── */
.detail-header{padding:16px 16px 12px;border-bottom:1px solid var(--bd);}
.dh-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.btn-back{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.dh-name{font-size:18px;font-weight:700;}
.dh-ticker{font-size:12px;color:var(--hint);}
.price-pill{margin-left:auto;text-align:right;}
.price-pill-val{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.price-pill-chg{font-size:11px;}

.price-bar{margin:0 16px 12px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:12px 14px;}
.pb-row{display:flex;align-items:center;gap:8px;}
.pb-lbl{font-size:12px;color:var(--muted);flex-shrink:0;}
.pb-ctrl{display:flex;align-items:center;gap:6px;flex:1;}
.btn-adj{width:34px;height:34px;border-radius:7px;border:1px solid var(--bd2);background:var(--bg3);color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;user-select:none;}
.btn-adj:active{background:var(--bd2);}
.price-inp{flex:1;font-size:26px;font-weight:700;border:none;background:transparent;color:var(--text);text-align:center;outline:none;min-width:0;font-variant-numeric:tabular-nums;}
.pb-unit{font-size:13px;color:var(--muted);}
.step-row{display:flex;align-items:center;gap:5px;margin-top:8px;}
.step-lbl{font-size:11px;color:var(--hint);}
.step-btn{font-size:12px;padding:3px 10px;border-radius:20px;border:1px solid var(--bd);background:transparent;color:var(--muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.step-btn.on{background:var(--bg3);color:var(--text);border-color:var(--bd2);}
.fetch-row{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd);}
.btn-fetch{font-size:12px;padding:5px 12px;border-radius:7px;border:1px solid var(--blue);background:var(--blue-bg);color:var(--blue);cursor:pointer;font-weight:500;flex-shrink:0;-webkit-tap-highlight-color:transparent;}
.fetch-status{font-size:11px;color:var(--hint);display:flex;align-items:center;gap:4px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--hint);display:inline-block;}
.dot.live{background:var(--green);animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.fetch-time{font-size:11px;color:var(--hint);margin-left:auto;}

/* Detail KPI */
.detail-kpi{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px 0;}
@media(min-width:420px){.detail-kpi{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:11px 12px;}
.kpi-lbl{font-size:10px;color:var(--hint);margin-bottom:4px;}
.kpi-val{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* Breakeven */
.be-card{margin:10px 16px 0;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:12px 14px;}
.be-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.be-lbl{font-size:12px;color:var(--muted);}
.be-gapval{font-size:13px;font-weight:700;}
.track{height:6px;background:var(--bg3);border-radius:3px;position:relative;}
.track-cost{position:absolute;top:-4px;bottom:-4px;width:2px;background:var(--hint);border-radius:1px;z-index:2;}
.track-fill{height:100%;border-radius:3px;transition:width .2s,background .2s;}
.be-bottom{display:flex;justify-content:space-between;font-size:10px;color:var(--hint);margin-top:4px;}

/* Detail tabs */
.dtab-row{display:flex;border-bottom:1px solid var(--bd);margin-top:14px;padding:0 16px;gap:0;}
.dtab{flex:1;padding:9px 0;text-align:center;font-size:13px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;-webkit-tap-highlight-color:transparent;}
.dtab.on{color:var(--blue);border-bottom-color:var(--blue);}

/* Tables */
.tbl-wrap{margin:0 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);overflow:hidden;overflow-x:auto;-webkit-overflow-scrolling:touch;margin-top:10px;}
table{width:100%;border-collapse:collapse;min-width:340px;}
th{font-size:10px;font-weight:600;color:var(--hint);letter-spacing:0.05em;padding:8px 12px;text-align:right;background:var(--bg1);border-bottom:1px solid var(--bd);white-space:nowrap;}
th:first-child{text-align:left;}
td{font-size:12px;padding:9px 12px;text-align:right;border-bottom:1px solid var(--bd);font-variant-numeric:tabular-nums;color:var(--text);white-space:nowrap;}
td:first-child{text-align:left;color:var(--muted);}
tr:last-child td{border-bottom:none;}
.tr-total td{background:var(--bg1);font-weight:700;color:var(--text)!important;}

/* Chart */
.chart-card{margin:10px 16px 0;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:12px 12px 8px;}
.chart-inner{position:relative;width:100%;height:170px;}

/* Dividend */
.div-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px 16px 0;}
@media(min-width:420px){.div-stats{grid-template-columns:repeat(4,1fr);}}
.div-stat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:11px 12px;}
.div-stat-lbl{font-size:10px;color:var(--hint);margin-bottom:4px;}
.div-stat-val{font-size:16px;font-weight:700;color:var(--gold);font-variant-numeric:tabular-nums;}
.div-stat-sub{font-size:10px;color:var(--muted);margin-top:2px;}

/* Edit modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.overlay.hidden{display:none;}
.modal{background:var(--bg1);border-radius:16px 16px 0 0;width:100%;max-width:700px;max-height:85vh;overflow-y:auto;padding:20px 20px calc(20px + var(--safe-bottom));}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-title{font-size:17px;font-weight:700;}
.btn-close{width:30px;height:30px;border-radius:50%;border:1px solid var(--bd2);background:var(--bg3);color:var(--muted);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--muted);margin-bottom:5px;}
.form-input{width:100%;padding:10px 12px;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;color:var(--text);font-size:15px;outline:none;}
.form-input:focus{border-color:var(--blue);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{width:100%;padding:13px;background:var(--blue);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;}
.btn-danger{width:100%;padding:11px;background:transparent;border:1px solid var(--red);border-radius:10px;color:var(--red);font-size:14px;cursor:pointer;margin-top:8px;}
.btn-secondary{padding:9px 16px;background:transparent;border:1px solid var(--bd2);border-radius:8px;color:var(--muted);font-size:13px;cursor:pointer;}

/* Helpers */
.red{color:var(--red)!important;}
.green{color:var(--green)!important;}
.gold{color:var(--gold)!important;}
.mt8{margin-top:8px;}
.mt12{margin-top:12px;}
.pb16{padding-bottom:16px;}
.empty{text-align:center;color:var(--hint);padding:24px;font-size:13px;}

.dtab-content{display:none;}.dtab-content.on{display:block;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="topbar-title" id="topTitle">台股損益</span>
    <button class="topbar-btn" id="topBtn" onclick="topAction()">＋ 新增股票</button>
  </div>

  <div class="content" id="mainContent">

    <!-- ── Overview Page ── -->
    <div class="page on" id="pageOverview">
      <div class="overview-hero">
        <div class="hero-label">
          <span>累積損益</span>
          <span id="heroStatus" style="font-size:11px;color:var(--hint);"></span>
        </div>
        <div class="hero-pnl" id="heroPnl">—</div>
        <div class="hero-row">
          <div class="hero-item">
            <div class="hero-item-lbl">持股市值</div>
            <div class="hero-item-val" id="heroMV">—</div>
          </div>
          <div class="hero-item">
            <div class="hero-item-lbl">持股日損益</div>
            <div class="hero-item-val" id="heroDayPnl">—</div>
          </div>
          <div class="hero-item">
            <div class="hero-item-lbl">股息收入</div>
            <div class="hero-item-val gold" id="heroDivIncome">—</div>
          </div>
        </div>
      </div>
      <div class="section-hd">
        <span>庫存股 (<span id="stockCount">0</span>)</span>
        <span style="color:var(--muted);font-size:10px;">總損益: <span id="totalPnlLabel">—</span></span>
      </div>
      <div class="stock-list" id="stockList"></div>
      <div style="height:16px;"></div>
    </div>

    <!-- ── Detail Page ── -->
    <div class="page" id="pageDetail">
      <div class="detail-header">
        <div class="dh-top">
          <button class="btn-back" onclick="goBack()">‹</button>
          <div>
            <div class="dh-name" id="dName"></div>
            <div class="dh-ticker" id="dTicker"></div>
          </div>
          <div class="price-pill">
            <div class="price-pill-val" id="dPriceVal">—</div>
            <div class="price-pill-chg" id="dPriceChg"></div>
          </div>
        </div>
      </div>

      <div class="price-bar">
        <div class="pb-row">
          <span class="pb-lbl">股價</span>
          <div class="pb-ctrl">
            <button class="btn-adj" ontouchstart="" onclick="adjPrice(-1)">−</button>
            <input class="price-inp" type="number" id="priceInp" inputmode="decimal" oninput="onPriceInput()">
            <button class="btn-adj" ontouchstart="" onclick="adjPrice(1)">+</button>
          </div>
          <span class="pb-unit">元</span>
        </div>
        <div class="step-row">
          <span class="step-lbl">步距</span>
          <button class="step-btn" onclick="setStep(0.5,this)">0.5</button>
          <button class="step-btn on" onclick="setStep(1,this)">1</button>
          <button class="step-btn" onclick="setStep(5,this)">5</button>
          <button class="step-btn" onclick="setStep(10,this)">10</button>
        </div>
        <div class="fetch-row">
          <button class="btn-fetch" id="btnFetch" onclick="fetchPrice()">↻ 即時股價</button>
          <span class="fetch-status"><span class="dot" id="fDot"></span><span id="fTxt">未更新</span></span>
          <span class="fetch-time" id="fTime"></span>
        </div>
      </div>

      <div class="detail-kpi">
        <div class="kpi"><div class="kpi-lbl">未實現損益</div><div class="kpi-val" id="dK1"></div><div class="kpi-sub" id="dK1s"></div></div>
        <div class="kpi"><div class="kpi-lbl">報酬率</div><div class="kpi-val" id="dK2"></div><div class="kpi-sub" id="dK2s"></div></div>
        <div class="kpi"><div class="kpi-lbl">持倉市值</div><div class="kpi-val" id="dK3"></div><div class="kpi-sub" id="dK3s"></div></div>
        <div class="kpi"><div class="kpi-lbl">含息損益</div><div class="kpi-val" id="dK4"></div><div class="kpi-sub" id="dK4s"></div></div>
      </div>

      <div class="be-card">
        <div class="be-top">
          <span class="be-lbl">損平 <span id="bePrice"></span> 元</span>
          <span class="be-gapval" id="beGap"></span>
        </div>
        <div class="track">
          <div class="track-cost" id="tCost"></div>
          <div class="track-fill" id="tFill"></div>
        </div>
        <div class="be-bottom"><span>0</span><span id="beRight"></span></div>
      </div>

      <!-- Detail sub-tabs -->
      <div class="dtab-row">
        <div class="dtab on" onclick="showDtab('broker',this)">券商明細</div>
        <div class="dtab" onclick="showDtab('tx',this)">交易記錄</div>
        <div class="dtab" onclick="showDtab('div',this)">股利</div>
        <div class="dtab" onclick="showDtab('chart',this)">情境圖</div>
      </div>

      <!-- Broker tab -->
      <div class="dtab-content on" id="dtab-broker">
        <div class="tbl-wrap">
          <table><thead><tr><th>券商</th><th>股數</th><th>買均</th><th>損益</th><th>%</th></tr></thead>
          <tbody id="brokerBody"></tbody></table>
        </div>
        <div style="padding:10px 16px 16px;text-align:right;">
          <button class="btn-secondary" onclick="openEditBroker()">✎ 編輯券商</button>
        </div>
      </div>

      <!-- TX tab -->
      <div class="dtab-content" id="dtab-tx">
        <div style="padding:10px 16px 6px;text-align:right;">
          <button class="btn-secondary" onclick="openAddTx()">＋ 新增交易</button>
        </div>
        <div class="tbl-wrap mt8">
          <table><thead><tr><th>日期</th><th>買/賣</th><th>股數</th><th>價格</th><th>收支</th></tr></thead>
          <tbody id="txBody"></tbody></table>
        </div>
        <div style="height:16px;"></div>
      </div>

      <!-- Div tab -->
      <div class="dtab-content" id="dtab-div">
        <div class="div-stats" id="divStats"></div>
        <div style="padding:10px 16px 6px;margin-top:4px;text-align:right;">
          <button class="btn-secondary" onclick="openAddDiv()">＋ 新增配息年度</button>
        </div>
        <div class="tbl-wrap">
          <table><thead><tr><th>年度</th><th>現金股利</th><th>股票股利</th><th>持股數</th><th>估領金額</th><th></th></tr></thead>
          <tbody id="divBody"></tbody></table>
        </div>
        <div style="height:16px;"></div>
      </div>

      <!-- Chart tab -->
      <div class="dtab-content" id="dtab-chart">
        <div class="chart-card mt8">
          <div class="chart-inner"><canvas id="scenarioChart" role="img" aria-label="損益情境折線圖"></canvas></div>
        </div>
        <div style="height:16px;"></div>
      </div>
    </div>

  </div><!-- /content -->

  <nav class="bottomnav">
    <button class="bnav on" onclick="showNav('overview',this)">
      <span style="font-size:20px;">⊞</span><span>總覽</span>
    </button>
    <button class="bnav" onclick="showNav('watchlist',this)">
      <span style="font-size:20px;">☆</span><span>自選</span>
    </button>
    <button class="bnav" onclick="showNav('settings',this)">
      <span style="font-size:20px;">⚙</span><span>設定</span>
    </button>
  </nav>
</div>

<!-- ── Modals ── -->
<!-- Add/Edit Stock -->
<div class="overlay hidden" id="modalStock">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title" id="modalStockTitle">新增股票</span>
      <button class="btn-close" onclick="closeModal('modalStock')">×</button>
    </div>
    <div class="form-group"><div class="form-label">股票代號</div><input class="form-input" id="fTicker" placeholder="例：2317"></div>
    <div class="form-group"><div class="form-label">股票名稱</div><input class="form-input" id="fName" placeholder="例：鴻海精密"></div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">持股總數（股）</div><input class="form-input" type="number" id="fShares" placeholder="例：156550"></div>
      <div class="form-group"><div class="form-label">加權成本均價（元）</div><input class="form-input" type="number" id="fAvgCost" placeholder="例：119.36"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><div class="form-label">總持倉成本（元）</div><input class="form-input" type="number" id="fTotalCost" placeholder="例：18686173"></div>
      <div class="form-group"><div class="form-label">買均（未含費，元）</div><input class="form-input" type="number" id="fBuyAvg" placeholder="例：114.55"></div>
    </div>
    <button class="btn-primary" onclick="saveStock()">儲存</button>
    <button class="btn-danger" id="btnDeleteStock" onclick="deleteStock()" style="display:none;">刪除此股票</button>
  </div>
</div>

<!-- Add TX -->
<div class="overlay hidden" id="modalTx">
  <div class="modal">
    <div class="modal-hd">
      <span class="modal-title">新增交易記錄</span>
      <button class="btn-close" onclick="closeModal('modalTx')">×</button>
    </div>
    <div class="form-group"><div class="form-label">日期</div><input class="form-input" type="date" id="fTxDate"></div>
    <div class="form-group">

function loadDetailPrice(s) {
  const inp = document.getElementById('priceInp');
  if (s.lastPrice) {
    inp.value = s.lastPrice;
    document.getElementById('fTxt').textContent = '上次記錄';
    document.getElementById('fTime').textContent = s.lastPriceTime || '';
    document.getElementById('fDot').className = 'dot';
  } else {
    inp.value = s.avgCost;
    document.getElementById('fTxt').textContent = '未更新（用成本均）';
    document.getElementById('fDot').className = 'dot';
    document.getElementById('fTime').textContent = '';
  }
  document.getElementById('bePrice').textContent = s.avgCost;
  document.getElementById('dPriceVal').textContent = inp.value;
}

function updateDetail() {
  const s = getStock(currentTicker);
  if (!s) return;
  const price = parseFloat(document.getElementById('priceInp').value) || s.avgCost;
  s.lastPrice = price;
  saveDB();

  const mv = price * s.shares;
  const pnl = mv - s.totalCost;
  const ret = pnl / s.totalCost * 100;
  const totalDiv = calcTotalDiv(s);
  const inclPnl = pnl + totalDiv;
  const inclRet = inclPnl / s.totalCost * 100;
  const gap = price - s.avgCost;
  const gapPct = gap / s.avgCost * 100;
  const pc = pnl >= 0 ? 'red' : 'green';
  const ic = inclPnl >= 0 ? 'red' : 'green';

  setKPI('dK1', nt(pnl), 'NT$' + fmtN(Math.abs(pnl)), pc);
  setKPI('dK2', (ret>=0?'+':'') + ret.toFixed(2)+'%', (gap>=0?'+':'') + gap.toFixed(2)+'元', pc);
  setKPI('dK3', 'NT$' + (mv/10000).toFixed(1)+'萬', fmtN(s.shares)+' 股', '');
  setKPI('dK4', nt(inclPnl), '含股利 NT$'+fmtN(Math.round(totalDiv)), ic);

  const maxP = Math.max(price*1.3, s.avgCost*1.6, 200);
  document.getElementById('tFill').style.width = Math.min(100,Math.max(1,price/maxP*100))+'%';
  document.getElementById('tFill').style.background = pnl>=0 ? 'var(--red)' : 'var(--green)';
  document.getElementById('tCost').style.left = (s.avgCost/maxP*100)+'%';
  const bgEl = document.getElementById('beGap');
  bgEl.textContent = (gapPct>=0?'+':'') + gapPct.toFixed(1)+'%';
  bgEl.className = 'be-gapval ' + (gapPct>=0?'red':'green');
  document.getElementById('beRight').textContent = fmtN(maxP,0)+'元';
  document.getElementById('dPriceVal').textContent = price.toFixed(price%1===0?0:2);

  renderBrokerTable(s, price);
  renderTxTable(s);
  renderDivTab(s);
}

function renderBrokerTable(s, price) {
  const tbody = document.getElementById('brokerBody');
  if (!s.brokers || !s.brokers.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">無券商資料</td></tr>'; return; }
  let rows = s.brokers.map(b => {
    const bMV = price * b.shares;
    const bPnl = bMV - b.cost;
    const bRet = bPnl / b.cost * 100;
    const c = bPnl >= 0 ? 'red' : 'green';
    return `<tr><td>${b.name}</td><td>${fmtN(b.shares)}</td><td>${b.avg.toFixed(2)}</td><td class="${c}">${nt(bPnl)}</td><td class="${c}">${(bRet>=0?'+':'')+bRet.toFixed(1)}%</td></tr>`;
  });
  const mv = price * s.shares;
  const pnl = mv - s.totalCost;
  const ret = pnl / s.totalCost * 100;
  const tc = pnl >= 0 ? 'red' : 'green';
  rows.push(`<tr class="tr-total"><td>合計</td><td>${fmtN(s.shares)}</td><td>${s.avgCost.toFixed(2)}</td><td class="${tc}">${nt(pnl)}</td><td class="${tc}">${(ret>=0?'+':'')+ret.toFixed(1)}%</td></tr>`);
  tbody.innerHTML = rows.join('');
}

function renderTxTable(s) {
  const tbody = document.getElementById('txBody');
  const txs = (s.transactions || []).slice().sort((a,b) => b.date.localeCompare(a.date));
  if (!txs.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">無交易記錄</td></tr>'; return; }
  tbody.innerHTML = txs.map((t,i) => {
    const realIdx = s.transactions.indexOf(t);
    const c = t.type==='買' ? 'green' : 'red';
    const amt = t.amount ? 'NT$'+fmtN(Math.abs(t.amount)) : '—';
    return `<tr><td>${t.date}</td><td class="${c}">${t.type}</td><td>${fmtN(t.shares)}</td><td>${t.price||'—'}</td><td>${amt}</td></tr>`;
  }).join('');
}

function renderDivTab(s) {
  const divs = (s.dividends || []).slice().sort((a,b) => b.year - a.year);
  const total = calcTotalDiv(s);
  const yrs = s.dividends ? s.dividends.length : 0;
  const lastDiv = divs[0];

  document.getElementById('divStats').innerHTML = `
    <div class="div-stat"><div class="div-stat-lbl">歷年累計股利</div><div class="div-stat-val">NT$${fmtN(Math.round(total))}</div><div class="div-stat-sub">估算值</div></div>

  `;

  const tbody = document.getElementById('divBody');
  if (!divs.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">無配息記錄</td></tr>'; return; }
  tbody.innerHTML = divs.map(d => {
    const est = Math.round((d.cash + d.stock) * d.shares);
    return `<tr>
      <td>${d.year}${d.note?' <span style="font-size:10px;color:var(--hint);">'+d.note+'</span>':''}</td>
      <td class="gold">${d.cash.toFixed(2)}</td>
      <td>${d.stock > 0 ? d.stock.toFixed(2) : '—'}</td>
      <td>${fmtN(d.shares)}</td>
      <td class="gold">NT$${fmtN(est)}</td>
      <td><button style="font-size:11px;padding:2px 8px;border-radius:6px;border:1px solid var(--bd2);background:transparent;color:var(--muted);cursor:pointer;" onclick="openEditDiv(${d.year})">編輯</button></td>
    </tr>`;
  }).join('');
}

// ══════════════════════════════════════════════════════
// CHART
// ══════════════════════════════════════════════════════
function drawChart() {
  const s = getStock(currentTicker);
  if (!s) return;
  const price = parseFloat(document.getElementById('priceInp').value) || s.avgCost;
  const step5 = 5;
  const start = Math.floor(s.avgCost * 0.55 / step5) * step5;
  const end = Math.ceil(Math.max(price * 1.45, s.avgCost * 1.8) / step5) * step5;
  const prices = [], pnls = [];
  for (let p = start; p <= end; p += step5) { prices.push(p); pnls.push((p - s.avgCost) * s.shares / 10000); }

  if (myChart) myChart.destroy();
  const ctx = document.getElementById('scenarioChart').getContext('2d');
  myChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: prices,
      datasets: [{
        data: pnls,
        borderColor: '#4a9eff', borderWidth: 2,
        pointRadius: prices.map(p => Math.abs(p - price) < step5/2+0.01 ? 5 : 0),
        pointBackgroundColor: '#4a9eff', pointBorderColor: '#1e2127', pointBorderWidth: 2,
        fill: { target: { value: 0 }, above: 'rgba(239,83,80,0.08)', below: 'rgba(38,166,154,0.08)' },
        tension: 0.35,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#262b33', titleColor: '#7a8090', bodyColor: '#e8eaf0',
          callbacks: { title: c => c[0].label+' 元', label: c => `損益 ${c.parsed.y>=0?'+':''}${c.parsed.y.toFixed(1)} 萬` }
        }
      },
      scales: {
        x: { ticks:{color:'#4a5060',font:{size:10},maxTicksLimit:8}, grid:{color:'#2e3340'}, title:{display:true,text:'股價 (元)',color:'#4a5060',font:{size:10}} },
        y: { ticks:{color:'#4a5060',font:{size:10},callback:v=>(v>=0?'+':'')+v.toFixed(0)+'萬'}, grid:{color:'#2e3340'} }
      }
    }
  });
}

// ══════════════════════════════════════════════════════
// FETCH PRICE
// ══════════════════════════════════════════════════════
async function fetchPrice() {
  const s = getStock(currentTicker);
  const btn = document.getElementById('btnFetch');
  btn.textContent = '抓取中...'; btn.disabled = true;
  document.getElementById('fTxt').textContent = '連線中...';

  const urls = [
    `https://query1.finance.yahoo.com/v8/finance/chart/${s.ticker}.TW?interval=1d&range=1d`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${s.ticker}.TW?interval=1d&range=1d`,
  ];
  let price = null;
  for (const url of urls) {
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      const data = await res.json();
      const meta = data?.chart?.result?.[0]?.meta;
      price = meta?.regularMarketPrice || meta?.previousClose;
      if (price) break;
    } catch(e) { continue; }
  }

  if (price) {
    document.getElementById('priceInp').value = price;
    const now = new Date();
    const t = String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    s.lastPrice = price;
    s.lastPriceTime = t + ' 更新';
    saveDB();
    document.getElementById('fDot').className = 'dot live';
    document.getElementById('fTxt').textContent = '即時';
    document.getElementById('fTime').textContent = t + ' 更新';
    document.getElementById('dPriceVal').textContent = price.toFixed(1);
    updateDetail();
  } else {
    document.getElementById('fDot').className = 'dot';
    document.getElementById('fTxt').textContent = '取得失敗';
    // fallback: use last stored or avgCost
    if (s.lastPrice) {
      document.getElementById('fTxt').textContent = '用上次記錄';
      document.getElementById('fTime').textContent = s.lastPriceTime || '';
    }
    alert('無法取得即時股價\n將使用' + (s.lastPrice ? '上次記錄價格' : '成本均價') + '。\n請確認網路連線。');
  }
  btn.textContent = '↻ 即時股價'; btn.disabled = false;
}

  document.getElementById('fTicker').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fShares').value = '';
  document.getElementById('fAvgCost').value = '';
  document.getElementById('fTotalCost').value = '';
  document.getElementById('fBuyAvg').value = '';
  document.getElementById('btnDeleteStock').style.display = 'none';
  document.getElementById('fTicker').readOnly = false;
  openModal('modalStock');
}
function openEditStock(ticker) {
  const s = getStock(ticker);
  document.getElementById('modalStockTitle').textContent = '編輯股票';
  document.getElementById('fTicker').value = s.ticker;
  document.getElementById('fName').value = s.name;
  document.getElementById('fShares').value = s.shares;
  document.getElementById('fAvgCost').value = s.avgCost;
  document.getElementById('fTotalCost').value = s.totalCost;
  document.getElementById('fBuyAvg').value = s.buyAvg || '';
  document.getElementById('btnDeleteStock').style.display = 'block';
  document.getElementById('fTicker').readOnly = true;
  openModal('modalStock');
}
function saveStock() {
  const ticker = document.getElementById('fTicker').value.trim();
  const name = document.getElementById('fName').value.trim();
  const shares = parseFloat(document.getElementById('fShares').value);
  const avgCost = parseFloat(document.getElementById('fAvgCost').value);
  const totalCost = parseFloat(document.getElementById('fTotalCost').value);
  const buyAvg = parseFloat(document.getElementById('fBuyAvg').value) || avgCost;
  if (!ticker || !name || !shares || !avgCost || !totalCost) { alert('請填寫必要欄位'); return; }
  if (!DB.stocks[ticker]) {
    DB.stocks[ticker] = { ticker, name, exchange:'TSE', shares, avgCost, totalCost, buyAvg, brokers:[], transactions:[], dividends:[], lastPrice:null, lastPriceTime:null };
  } else {
    const s = DB.stocks[ticker];
    s.name=name; s.shares=shares; s.avgCost=avgCost; s.totalCost=totalCost; s.buyAvg=buyAvg;
  }
  saveDB();
  closeModal('modalStock');
  renderOverview();
  if (currentTicker === ticker) updateDetail();
}
function deleteStock() {
  const ticker = document.getElementById('fTicker').value;
  if (!confirm(`確定要刪除 ${ticker} ${DB.stocks[ticker]?.name}？此操作無法復原。`)) return;
  delete DB.stocks[ticker];
  saveDB();
  closeModal('modalStock');
  goBack();
}

function openAddTx() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('fTxDate').value = today;
  document.getElementById('fTxType').value = '買';
  document.getElementById('fTxShares').value = '';
  document.getElementById('fTxPrice').value = '';
  document.getElementById('fTxAmt').value = '';
  openModal('modalTx');
}
function saveTx() {
  const date = document.getElementById('fTxDate').value;
  const type = document.getElementById('fTxType').value;
  const shares = parseFloat(document.getElementById('fTxShares').value);
  const price = parseFloat(document.getElementById('fTxPrice').value);
  const amt = parseFloat(document.getElementById('fTxAmt').value) || null;
  if (!date || !shares || !price) { alert('請填寫日期、股數、價格'); return; }
  const s = getStock(currentTicker);
  s.transactions = s.transactions || [];
  s.transactions.push({ date: date.replace(/-/g,'/'), type, shares, price, amount: amt || Math.round(price * shares) });
  saveDB();
  closeModal('modalTx');
  renderTxTable(s);
}

function openAddDiv() {
  editDivYear = null;
  document.getElementById('modalDivTitle').textContent = '新增配息年度';
  document.getElementById('fDivYear').value = '';
  document.getElementById('fDivShares').value = getStock(currentTicker).shares;
  document.getElementById('fDivCash').value = '';
  document.getElementById('fDivStock').value = '0';
  document.getElementById('fDivNote').value = '';
  document.getElementById('btnDeleteDiv').style.display = 'none';
  openModal('modalDiv');
}
function openEditDiv(year) {
  editDivYear = year;
  const s = getStock(currentTicker);
  const d = s.dividends.find(x => x.year === year);
  if (!d) return;
  document.getElementById('modalDivTitle').textContent = '編輯配息年度';
  document.getElementById('fDivYear').value = d.year;
  document.getElementById('fDivShares').value = d.shares;
  document.getElementById('fDivCash').value = d.cash;
  document.getElementById('fDivStock').value = d.stock;
  document.getElementById('fDivNote').value = d.note || '';
  document.getElementById('btnDeleteDiv').style.display = 'block';
  openModal('modalDiv');
}
function saveDiv() {
  const year = parseInt(document.getElementById('fDivYear').value);
  const shares = parseInt(document.getElementById('fDivShares').value);
  const cash = parseFloat(document.getElementById('fDivCash').value);
  const stock = parseFloat(document.getElementById('fDivStock').value) || 0;
  const note = document.getElementById('fDivNote').value.trim();
  if (!year || !shares || isNaN(cash)) { alert('請填寫年度、持股數、現金股利'); return; }
  const s = getStock(currentTicker);
  s.dividends = s.dividends || [];
  const idx = s.dividends.findIndex(x => x.year === year);
  if (idx >= 0) s.dividends[idx] = { year, shares, cash, stock, note };
  else s.dividends.push({ year, shares, cash, stock, note });
  saveDB();
  closeModal('modalDiv');
  renderDivTab(s);
}
function deleteDiv() {
  if (!editDivYear) return;
  if (!confirm(`確定刪除 ${editDivYear} 年配息記錄？`)) return;
  const s = getStock(currentTicker);
  s.dividends = s.dividends.filter(x => x.year !== editDivYear);
  saveDB();
  closeModal('modalDiv');
  renderDivTab(s);
}

function openEditBroker() {
  alert('券商明細編輯：請使用「編輯」按鈕（右上角）進入股票設定，目前版本券商明細需整批更新。下一版本將支援逐筆編輯。');
}

// close modal by tapping overlay
document.querySelectorAll('.overlay').forEach(el => {
  el.addEventListener('click', function(e) { if (e.target === this) this.classList.add('hidden'); });
});

// HELPERS
// ══════════════════════════════════════════════════════
function calcTotalDiv(s) {
  return (s.dividends || []).reduce((a, d) => a + (d.cash + d.stock) * d.shares, 0);
}
function setKPI(id, val, sub, cls) {
  const el = document.getElementById(id);
  el.textContent = val;
  el.className = 'kpi-val' + (cls ? ' ' + cls : '');
  const se = document.getElementById(id + 's');
  if (se) se.textContent = sub;
}
function nt(n) {
  const abs = Math.abs(n);
  const s = abs >= 100000000 ? (abs/100000000).toFixed(2)+'億'
           : abs >= 10000 ? (abs/10000).toFixed(1)+'萬'
           : fmtN(abs);
  return (n >= 0 ? '+' : '-') + 'NT$' + s;
}
function fmtN(n, d=0) { return n.toLocaleString('zh-TW', {minimumFractionDigits:d, maximumFractionDigits:d}); }
