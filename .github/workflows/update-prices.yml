name: 更新台股股價

on:
  schedule:
    # 台灣時間 09:00~14:00，每 15 分鐘執行一次（UTC 時間 01:00~06:00）
    - cron: '0,15,30,45 1,2,3,4,5 * * 1-5'
  workflow_dispatch: # 允許手動觸發

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 允許 commit 回 repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 抓取股價
        run: python scripts/fetch_prices.py

      - name: Commit & Push prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          # 只有檔案有變更才 commit
          git diff --staged --quiet || git commit -m "chore: update prices $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
